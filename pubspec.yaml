name: mboka_care_mobile
description: Application mobile Mboka Care
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:

  # Firebase Core (requis pour FCM)
  firebase_core: ^2.24.2

  # Firebase Cloud Messaging (notifications push serveur)
  firebase_messaging: ^14.7.10

  # Notifications locales avec alarme
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Network
  dio: ^5.3.2
  pretty_dio_logger: ^1.3.1
  http: ^0.13.6

  # Storage
  shared_preferences: ^2.0.15

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6

  # File / Image
  file_picker: ^8.0.3
  image_picker: ^1.0.7

  # Auth biométrique
  local_auth: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
